# lora_qwen3_8b_sft.yaml
# 纳西妲 Agent - 主模型 SFT 对话训练配置
# 用途：用纳西妲人设对话数据微调 Qwen3-8B，强化人设一致性
# 与 review 数据的区别：review 数据训练 1.5B 做分类判断；SFT 数据训练 8B 做对话生成

### 模型
model_name_or_path: Qwen/Qwen3-8B-Instruct
model_type: qwen

### 微调方法
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

### 数据集
dataset: sft_nahida_dialogue
template: qwen
split: train

### 训练超参
learning_rate: 1.0e-5
num_train_epochs: 5
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
warmup_steps: 50
weight_decay: 0.01
max_grad_norm: 1.0

### 优化器
optim: adamw_torch
lr_scheduler_type: cosine

### 输出
output_dir: saves/qwen3-8b-instruct/lora/sft-nahida-v1
logging_steps: 5
save_steps: 50
save_total_limit: 3

### 长度
cutoff_len: 2048
max_samples: 100000

### 精度
bf16: true
fp16: false
