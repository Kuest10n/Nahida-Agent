# ── Qwen2.5-1.5B 四审模型 LoRA 训练配置 ──────────────────
# 训练目标：intent/output/emotion/code 四维度分类
# 数据集：review_data.jsonl (110 条, A30/B25/C30/D25)
# 硬件：RTX 3060 12G
# 用法：LLaMA-Factory CLI → yaml/cli_args 参数注入

### model
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
finetuning_type: lora

### method
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
  - o_proj    # 1.5B 12 层，o_proj 加一下稳 emotion 双路

### dataset
dataset: review_data
template: qwen
cutoff_len: 1024
max_samples: 110

### output
output_dir: saves/qwen1.5b-review-lora
logging_steps: 5
save_steps: 50
plot_loss: true

### train
learning_rate: 2.0e-5
per_device_train_batch_size: 4
gradient_accumulation_steps: 2   # 3060 12G: 4*2=8 有效 batch
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
fp16: true
ddp_timeout: 180000000

### eval
val_size: 0.1   # 110 条抽 10%≈11 条做验证
